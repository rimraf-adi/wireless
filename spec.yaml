assignment_details:
  course: "ECL 439 Wireless Communication"
  session: "Jan-April 2026"
  submission_deadline: "2026-04-06"
  target_location: "Kagal, Kolhapur, MH"
  reference: "3GPP TR 38.901 V18.0.0 (2024-05)"

part_1_outdoor_planning:
  site_analysis:
    clutter_types:
      - "High Density: Kagal Gaothan, Main Market (requires Microcells)"
      - "Linear High Mobility: AH47 Highway (requires Umbrella Cells)"
      - "Industrial: 5-Star MIDC Kagal (multipath rich environment)"
      - "Sparse: Surrounding agricultural zones (Coverage limited)"
  link_budget:
    formula: "Lmax = Pt_dBm - Pr_min_dBm"
    model_choice: "Urban Macro (UMa) - Table 7.4.1-1"
    justification: "Kagal is a developed town with building heights ($h_E$) and street widths consistent with UMa parameters."
  design_criteria:
    condition: "R_cell < R_max"
    reuse_ratio: "Q = D/R = sqrt(3N)"

part_2_small_scale_effects:
  reference_section: "3GPP TR 38.901 Section 7.5 (Fast Fading)"
  simulation_steps:
    step_1: "Environment setup (Network layout, antenna arrays)"
    step_2: "Assign propagation condition (LOS/NLOS)"
    step_3: "Calculate Path Loss and Shadow Fading"
    step_4: "Generate Delay Clusters (based on Table 7.5-6)"
    step_5: "Generate Cluster Powers"
    step_6: "Generate Arrival/Departure Angles (AoA, AoD, ZoA, ZoD)"
  bonus_goal: "Step 11 (Generate the final Channel Matrix H_u,s,n(t))"

submission_checklist:
  file_name: "<enrolment_number>_<name>.pdf"
  format: "PDF only"
  code_inclusion: "Python/MATLAB/Scilab source code must be appended"